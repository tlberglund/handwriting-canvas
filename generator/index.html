<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Handwriting Animator</title>
   <link rel="stylesheet" href="./styles.css">
</head>
<body>
   <div id="stage">
      <div id="canvas-container">
         <canvas id="output-canvas"></canvas>
      </div>
   </div>

   <aside id="panel">
      <div id="panel-placeholder">
         <p>Select a text object or<br>create a new one</p>
      </div>
      <div id="panel-controls" style="display: none">
         <div class="control-item">
            <label for="text-input">Text</label>
            <input type="text" id="text-input" placeholder="Enter text…">
         </div>
         <div class="control-item">
            <label for="cap-height-slider">Cap Height</label>
            <div class="value-row">
               <input type="range" id="cap-height-slider" min="20" max="200" step="4" value="80">
               <span class="val-display" id="cap-height-val">80px</span>
            </div>
         </div>
         <div class="control-item">
            <label for="speed-slider">Speed</label>
            <div class="value-row">
               <input type="range" id="speed-slider" min="0.5" max="5" step="0.1" value="1.5">
               <span class="val-display" id="speed-val">1.5×</span>
            </div>
         </div>
         <div class="control-item">
            <label for="thickness-slider">Thickness</label>
            <div class="value-row">
               <input type="range" id="thickness-slider" min="1" max="10" step="0.5" value="2">
               <span class="val-display" id="thickness-val">2px</span>
            </div>
         </div>
         <div class="control-item">
            <label for="color-picker">Ink Color</label>
            <input type="color" id="color-picker" value="#1a1a1a">
         </div>
         <div class="control-item">
            <label>Highlight</label>
            <div class="value-row">
               <input type="checkbox" id="highlight-enable">
               <input type="color" id="highlight-picker" value="#ffff66">
            </div>
         </div>
         <div class="control-item">
            <label for="pixel-density-slider">Pixel Density</label>
            <div class="value-row">
               <input type="range" id="pixel-density-slider" min="1" max="4" step="1" value="2">
               <span class="val-display" id="pixel-density-val">2</span>
            </div>
         </div>
         <div class="action-row">
            <button id="btn-animate">Animate</button>
            <button id="btn-clear">Clear</button>
         </div>
         <button id="btn-delete">Delete Object</button>
      </div>
      <div class="panel-canvas">
         <div class="control-item">
            <label for="canvas-bg-picker">Canvas Background</label>
            <input type="color" id="canvas-bg-picker" value="#ffffff">
         </div>
      </div>
      <div class="panel-footer">
         <button id="btn-new">+ New Text</button>
      </div>
   </aside>

   <script type="module" src="./main.js"></script>
</body>
</html>
